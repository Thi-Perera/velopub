name: Pubblicazione programmata

on:
  schedule:
    # Ogni 4 ore (orario UTC: in Italia +1 inverno, +2 estate)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "story o post"
        required: false
        default: "story"
        type: choice
        options:
          - story
          - post

permissions:
  contents: write

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ImageMagick serve per il ritaglio 9:16 delle storie (di solito è già
      # sul runner: questo passo è un no-op da pochi secondi in quel caso)
      - name: Assicura ImageMagick
        run: command -v convert >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick)

      - name: Importa foto nuove da Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node import-from-telegram.js

      - name: Pubblica su Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node publish.js "${{ inputs.mode || 'story' }}"
