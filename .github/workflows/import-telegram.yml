name: Importa foto da Telegram

on:
  workflow_dispatch:
  schedule:
    # Ogni ora al minuto 17 (sfalsato per non scontrarsi con la pubblicazione)
    - cron: '17 * * * *'

permissions:
  contents: write

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ImageMagick serve alla normalizzazione degli zip POST (ratio uniforme,
      # JPEG 1440px). Di solito è già sul runner: no-op da pochi secondi.
      - name: Assicura ImageMagick
        run: command -v convert >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick)

      - name: Importa foto nuove da Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node import-from-telegram.js
